description: |-
  Secret holds secret data of a certain type.
  Used to store ServiceAccount tokens.
properties:
  apiVersion:
    description: |-
      APIVersion defines the versioned schema of this representation of an object.
      Servers should convert recognized schemas to the latest internal value, and
      may reject unrecognized values.
      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
    type: string
  data:
    additionalProperties:
      format: byte
      type: string
    description: |-
      Data contains the secret data. Each key must consist of alphanumeric characters, '-', '_' or '.'.
      The values are base64 encoded strings.
    type: object
  kind:
    description: |-
      Kind is a string value representing the REST resource this object represents.
      Servers may infer this from the endpoint the client submits requests to.
      Cannot be updated.
      In CamelCase.
      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
    type: string
  metadata:
    type: object
  stringData:
    additionalProperties:
      type: string
    description: |-
      StringData allows specifying non-binary secret data in string form.
      It is provided as a write-only convenience method.
      All keys and values are merged into the data field on write, overwriting any existing values.
    type: object
  type:
    description: Type of secret. For ServiceAccount tokens, this should be "kubernetes.io/service-account-token".
    type: string
type: object
